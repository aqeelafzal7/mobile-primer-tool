<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioPrime | Professional Primer Design</title>
        <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .key-shadow { box-shadow: 0 4px 0 0 #cbd5e1; }
        .key-shadow:active { box-shadow: 0 0px 0 0 #cbd5e1; transform: translateY(4px); }
        .pulse-red { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        #sequenceDisplay::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white p-4 shadow-xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                        <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo" class="w-10 h-10 rounded-lg shadow-md border border-slate-700">
                <div>
                    <h1 class="text-xl font-extrabold tracking-tighter text-indigo-400 leading-none mb-1">BIOPRIME <span class="text-white">V2.0</span></h1>
                    <p class="text-[9px] uppercase tracking-widest text-slate-400 leading-none">Bioinformatics Workstation</p>
                </div>
            </div>
                <div class="w-2 h-2 bg-red-500 rounded-full pulse-red"></div>
     </div>
        </div>
    </header>

    <main class="flex-1 max-w-md mx-auto w-full p-4 space-y-4">
        
        <div class="bg-black rounded-xl p-4 shadow-inner border-4 border-slate-800">
            <div class="flex justify-between text-[10px] text-emerald-500 mb-2 font-bold uppercase tracking-widest">
                <span>Sequence Monitor</span>
                <span id="baseCount">0 BP</span>
            </div>
            <div id="sequenceDisplay" class="h-24 overflow-y-auto break-all mono text-xl text-emerald-400 leading-tight tracking-widest"></div>
        </div>

        <div class="grid grid-cols-4 gap-3">
            <button onclick="inputBase('A')" class="key-shadow bg-white border-2 border-slate-200 rounded-xl py-6 text-2xl font-black text-slate-700 hover:bg-slate-50">A</button>
            <button onclick="inputBase('T')" class="key-shadow bg-white border-2 border-slate-200 rounded-xl py-6 text-2xl font-black text-slate-700 hover:bg-slate-50">T</button>
            <button onclick="inputBase('C')" class="key-shadow bg-white border-2 border-slate-200 rounded-xl py-6 text-2xl font-black text-slate-700 hover:bg-slate-50">C</button>
            <button onclick="inputBase('G')" class="key-shadow bg-white border-2 border-slate-200 rounded-xl py-6 text-2xl font-black text-slate-700 hover:bg-slate-50">G</button>
            
            <button onclick="toggleVoice()" id="micBtn" class="col-span-2 key-shadow bg-slate-100 border-2 border-slate-200 rounded-xl py-4 flex items-center justify-center gap-2 font-bold text-slate-600">
                <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                Voice Assistant
            </button>
            <button onclick="deleteBase()" class="col-span-2 key-shadow bg-rose-50 border-2 border-rose-200 rounded-xl py-4 font-bold text-rose-600 uppercase tracking-widest">Delete</button>
        </div>

        <div class="flex gap-3">
            <button onclick="generatePrimers()" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-200 active:scale-95 transition-transform uppercase tracking-wider">Generate Result</button>
            <button onclick="clearAll()" class="bg-slate-200 text-slate-600 px-6 rounded-xl font-bold">Reset</button>
        </div>

        <div id="resultsArea" class="hidden space-y-4 pb-6 mt-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-8 border-l-emerald-500">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-black text-emerald-600 uppercase">Forward Primer</span>
                    <button onclick="copyText('fwdSeq')" class="text-indigo-600 text-xs font-bold">Copy</button>
                </div>
                <p id="fwdSeq" class="mono text-lg break-all font-bold text-slate-800 mb-3"></p>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-slate-50 p-2 rounded">
                        <p class="text-[10px] text-slate-400 uppercase">Len</p>
                        <p id="fwdLen" class="text-sm font-bold"></p>
                    </div>
                    <div class="bg-slate-50 p-2 rounded">
                        <p class="text-[10px] text-slate-400 uppercase">GC%</p>
                        <p id="fwdGC" class="text-sm font-bold"></p>
                    </div>
                    <div class="bg-slate-50 p-2 rounded">
                        <p class="text-[10px] text-slate-400 uppercase">Tm</p>
                        <p id="fwdTm" class="text-sm font-bold"></p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 border-l-8 border-l-rose-500">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-black text-rose-600 uppercase">Reverse Primer</span>
                    <button onclick="copyText('revSeq')" class="text-indigo-600 text-xs font-bold">Copy</button>
                </div>
                <p id="revSeq" class="mono text-lg break-all font-bold text-slate-800 mb-3"></p>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-slate-50 p-2 rounded">
                        <p class="text-[10px] text-slate-400 uppercase">Len</p>
                        <p id="revLen" class="text-sm font-bold"></p>
                    </div>
                    <div class="bg-slate-50 p-2 rounded">
                        <p class="text-[10px] text-slate-400 uppercase">GC%</p>
                        <p id="revGC" class="text-sm font-bold"></p>
                    </div>
                    <div class="bg-slate-50 p-2 rounded">
                        <p class="text-[10px] text-slate-400 uppercase">Tm</p>
                        <p id="revTm" class="text-sm font-bold"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-6 text-center text-[10px] text-slate-400 font-bold tracking-widest uppercase bg-slate-100 border-t border-slate-200">
        Developed by M Aqeel Afzal. &copy; 2026 All rights reserved.
    </footer>

    <script>
        let sequence = "";
        let isListening = false;
        let recognition = null;

        // --- KEYBOARD INTERCEPTOR ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (['A', 'T', 'C', 'G'].includes(key)) {
                inputBase(key);
            } else if (e.key === 'Backspace') {
                deleteBase();
            }
            e.preventDefault(); 
        }, true);

        // --- CORE LOGIC ---
        function inputBase(base) {
            sequence += base;
            updateDisplay();
        }

        function deleteBase() {
            sequence = sequence.slice(0, -1);
            updateDisplay();
        }

        function clearAll() {
            sequence = "";
            updateDisplay();
            document.getElementById('resultsArea').classList.add('hidden');
        }

        function updateDisplay() {
            const display = document.getElementById('sequenceDisplay');
            display.innerText = sequence;
            document.getElementById('baseCount').innerText = `${sequence.length} BP`;
            display.scrollTop = display.scrollHeight;
        }

        function calculateStats(seq) {
            const len = seq.length;
            const g = (seq.match(/G/g) || []).length;
            const c = (seq.match(/C/g) || []).length;
            const a = (seq.match(/A/g) || []).length;
            const t = (seq.match(/T/g) || []).length;
            const gc = ((g + c) / len) * 100;
            const tm = (4 * (g + c)) + (2 * (a + t));
            return { seq, len, gc: gc.toFixed(1), tm };
        }

        function getReverseComplement(seq) {
            const comp = { 'A': 'T', 'T': 'A', 'C': 'G', 'G': 'C' };
            return seq.split('').reverse().map(b => comp[b]).join('');
        }

        function findPrimer(target, isReverse = false) {
            const workingSeq = isReverse ? getReverseComplement(target) : target;
            for (let len = 20; len <= 24; len++) {
                const sub = workingSeq.substring(0, len);
                const stats = calculateStats(sub);
                if (stats.gc >= 40 && stats.gc <= 60 && stats.tm >= 50 && stats.tm <= 65) return stats;
            }
            return calculateStats(workingSeq.substring(0, 20)); 
        }

        function generatePrimers() {
            if (sequence.length < 40) {
                alert("Sequence too short (min 40bp)");
                return;
            }
            const fwd = findPrimer(sequence.substring(0, 30));
            const rev = findPrimer(sequence.substring(sequence.length - 30), true);

            updateUI('fwd', fwd);
            updateUI('rev', rev);
            document.getElementById('resultsArea').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function updateUI(prefix, data) {
            document.getElementById(`${prefix}Seq`).innerText = data.seq;
            document.getElementById(`${prefix}Len`).innerText = `${data.len}bp`;
            document.getElementById(`${prefix}GC`).innerText = `${data.gc}%`;
            document.getElementById(`${prefix}Tm`).innerText = `${data.tm}°C`;
        }

        // --- VOICE ASSISTANT ---
        function initSpeech() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Speech API not supported in this browser.");
            
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
                
                if (transcript.includes('generate') || transcript.includes('result')) {
                    generatePrimers();
                    return;
                }

                const words = transcript.split(' ');
                words.forEach(word => {
                    if (['a', 'alpha', 'hay'].includes(word)) inputBase('A');
                    else if (['t', 'tea', 'tee', 'tango'].includes(word)) inputBase('T');
                    else if (['c', 'see', 'sea', 'charlie'].includes(word)) inputBase('C');
                    else if (['g', 'gee', 'gui', 'golf'].includes(word)) inputBase('G');
                });
            };

            recognition.onend = () => { if (isListening) recognition.start(); };
        }

        function toggleVoice() {
            if (!recognition) initSpeech();
            isListening = !isListening;
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('voiceStatus');
            
            if (isListening) {
                try { recognition.start(); } catch(e) {}
                btn.classList.replace('bg-slate-100', 'bg-red-50');
                btn.classList.add('text-red-600', 'border-red-200');
                status.classList.remove('hidden');
            } else {
                recognition.stop();
                btn.classList.replace('bg-red-50', 'bg-slate-100');
                btn.classList.remove('text-red-600', 'border-red-200');
                status.classList.add('hidden');
            }
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            btn.classList.add('text-emerald-500');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('text-emerald-500');
            }, 1500);
        }
    </script>
</body>
</html>
